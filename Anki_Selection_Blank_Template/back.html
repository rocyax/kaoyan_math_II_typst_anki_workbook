<div class="typst-box" data-level="{{难度}}">
  <div class="typst-header"><span class="header-text">{{难度}}</span></div>
  <div class="typst-body">
    <div class="math-scroll-wrapper question">
      <span id="questionType" class="question-type"> </span><span id="q-content">{{问题}}</span>
    </div>
    
    <div class="options" id="back-options">
      <li class="option"> </li>
      <li class="option"> </li>
    </div>
    
    <div id="back-tag"></div>
    <div id="hidden-options" style="display: none;">{{选项}}</div>
    <div id="tips" class="tips"></div>
    
    {{#背面}}
    <div id="notes-wrapper">
      <hr id="answer">
      <div class="notes-button-container" onclick="showNotes()">
        <a href="javascript:showNotes();" class="show-notes-btn">⬇️ 显示解析</a>
      </div>
      <div class="notes-container">
        <div class="math-scroll-wrapper">{{背面}}</div>
      </div>
    </div>
    {{/背面}}
    
  </div>
</div>

<script>
  function showBackOptions() {
    var _isNormalOption = isNormalOption()
    var correctClass = _isNormalOption ? 'correct' : 'correct-light'
    var wrongClass = _isNormalOption ? 'wrong' : 'wrong-light'
    var shouldSelectClass = _isNormalOption ? 'should-select' : 'should-select-light'
    var optionObjs = getOptionObjs()
    var liList = ''
    var isMulti = "{{答案}}".indexOf('||') > 0
    for (var i in optionObjs) {
      var _optionObj = optionObjs[i]
      var _option = _optionObj.label
      var _optionKey = _optionObj.key + ''
      var _isSelected = isSelected(_optionKey)
      var _isCorrect = isCorrectAnswer(_optionKey)
      var _class = ''
      if (isMulti) {
        if (_isSelected && _isCorrect) _class = 'option ' + correctClass
        else if (!_isSelected && _isCorrect) _class = 'option ' + shouldSelectClass
        else if (_isSelected && !_isCorrect) _class = 'option ' + wrongClass
        else _class = 'option'
      } else {
        if (_isCorrect) _class = 'option ' + correctClass
        else _class = _isSelected ? 'option ' + wrongClass : 'option'
      }
      liList += "<li class='" + _class + "'><div class='math-scroll-wrapper'>" + _option + "</div></li>"
    }
    document.getElementById("back-options").innerHTML = liList;
    if (typeof MathJax !== "undefined" && MathJax.typesetPromise) { MathJax.typesetPromise(); }
  }

  function isCorrectAnswer(optionKey) { return "{{答案}}".indexOf(optionKey) > -1 }
  function isSelected(optionKey) {
    if (!Persistence.isAvailable()) return false
    return (Persistence.getItem('ANKI-SELECTED') || '').indexOf(optionKey) > -1
  }

function getOptionObjs() {
      var rawHtml = document.getElementById("hidden-options").innerHTML;
      var optionArray = rawHtml.split("||");
      var optionObjs = [];
      for (var i = 0; i < optionArray.length; i++) {
        optionObjs.push({ key: i + 1, label: optionArray[i].trim() });
      }
      if (Persistence.isAvailable()) {
        var optionsOrder = (Persistence.getItem('ANKI-OPTIONS-ORDER') || '').trim().split(',')
        optionObjs = optionObjs.sort(function(a, b) {
          return optionsOrder.indexOf(a.key + '') - optionsOrder.indexOf(b.key + '')
        })
      }
      return optionObjs
    }

  function isNormalOption() {
    if (Persistence.isAvailable()) { return Persistence.getItem('ANKI-SETTINGS-NORMAL-OPTIONS') === '1' } 
    else { return false }
  }

  showBackOptions()
</script>

<script>
  function showTags () {
    var tags = "{{Tags}}".trim()
    if (!tags) return
    tags = tags.split(' ')
    var tagList = '<span class="tag-title">标签: </span>'
    for (var tag of tags) {
      if (tag) tagList += '<span class="single-tag">' + tag + '</span>'
    }
    document.getElementById("back-tag").innerHTML = tagList
  }

  function numberToAlpha(numbers) {
    var optionsOrder = []
    if (Persistence.isAvailable()) {
      optionsOrder = Persistence.getItem('ANKI-OPTIONS-ORDER').trim().split(',')
    }
    var alphas = []
    for (var i in numbers) {
      var number = numbers[i]
      if (number) {
        if (optionsOrder.length === 0) alphas.push(String.fromCharCode(Number.parseInt(number) + 64))
        else alphas.push(String.fromCharCode(optionsOrder.indexOf(number) + 65))
      }
    }
    alphas.sort()
    return alphas.toString()
  }

  function showAnswers() {
    var correctAnswers = numberToAlpha("{{答案}}".trim().split('||'))
    var yourChoice = '未选择'
    if (Persistence.isAvailable()) {
      var selectedNumbers = (Persistence.getItem('ANKI-SELECTED') || '').trim().split(',')
      yourChoice = numberToAlpha(selectedNumbers)
      Persistence.setItem('ANKI-SELECTED', '')
      var showQuestionType = Persistence.getItem('ANKI-SETTINGS-SHOW-QUESTION-TYPE') || '0'
      if (showQuestionType === '1') {
        document.getElementById('questionType').innerHTML = "{{答案}}".indexOf('||') > -1 ? '【多选】' : '【单选】'
      } else {
        document.getElementById('questionType').innerHTML = ' '
      }
    }
    document.getElementById('tips').innerHTML = '正确选项：' + correctAnswers + '&nbsp;&nbsp;&nbsp;&nbsp; 你的选项：' + yourChoice
  }

  function showNotes() {
    if (document.getElementsByClassName('notes-container')[0].innerHTML) {
      document.getElementById('notes-wrapper').style.display = 'block'
      var totalHeight = window.innerHeight
      var left = totalHeight - document.getElementsByClassName('typst-box')[0].clientHeight - 140
      if (left < 80) left = 80
      var noteContainer = document.getElementsByClassName('notes-container')[0]
      noteContainer.style.maxHeight = 'none' /* 让它自然撑开，适配box逻辑 */
      noteContainer.style.display = 'block'
      document.getElementsByClassName('notes-button-container')[0].style.display = 'none'
    }
  }

  function showNoteButton() {
    if (document.getElementsByClassName('notes-container')[0].innerHTML) {
      document.getElementsByClassName('notes-button-container')[0].style.display = 'block'
      document.getElementById('notes-wrapper').style.display = 'block'
    }
  }

function prepareNotes() {
    var notesWrapper = document.getElementById('notes-wrapper');
    // 如果存在 notes-wrapper，说明有解析内容，接着按用户的设置决定隐藏还是显示
    if (notesWrapper) {
      if (Persistence.isAvailable()) {
        if (Persistence.getItem('ANKI-SETTINGS-HIDE-NOTES') !== '1') {
            showNotes()
        } else {
            showNoteButton()
        }
      } else {
          showNotes()
      }
    }
  }

  showTags()
  showAnswers()
  prepareNotes()

  // 动态模拟填空效果 (背面直接高亮显示答案)
  var qNode = document.getElementById('q-content');
  if (qNode) {
    // 修改正则，匹配 ((c1::内容))
    qNode.innerHTML = qNode.innerHTML.replace(/\(\(c\d+::(.*?)(::(.*?))?\)\)/g, "<span class='cloze'>$1</span>");
  }
</script>
